<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horses — Stirrup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f9f8f5;color:#1a1a18;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:#fff;border-bottom:1px solid #e8e6e0}
.logo{font-size:18px;font-weight:600;color:#1a1a18;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:12px}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;font-family:'Inter',sans-serif;border:1px solid transparent}
.btn-primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-primary:hover{background:#178a64}
.btn-ghost{background:transparent;border-color:#d4d2cb;color:#1a1a18}
.btn-ghost:hover{background:#f0efe9}
.wrap{max-width:720px;margin:0 auto;padding:2rem}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.page-title{font-size:22px;font-weight:600}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.sum{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:.75rem 1rem}
.sum-label{font-size:11px;color:#5a5a55;margin-bottom:3px}
.sum-val{font-size:20px;font-weight:600;color:#1a1a18}
.horse-card{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:1rem 1.25rem;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:background .15s}
.horse-card:hover{background:#f9f8f5}
.horse-icon{width:40px;height:40px;border-radius:50%;background:#faeeda;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.horse-info{flex:1;min-width:0}
.horse-name{font-size:14px;font-weight:500;color:#1a1a18}
.horse-meta{font-size:12px;color:#5a5a55;margin-top:1px}
.horse-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-remove{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #e8c5c5;background:transparent;color:#c0392b;cursor:pointer;font-family:'Inter',sans-serif}
.btn-remove:hover{background:#fcebeb}
.empty{text-align:center;padding:3rem 1rem}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:500;color:#1a1a18;margin-bottom:6px}
.empty-sub{font-size:13px;color:#5a5a55;margin-bottom:1.25rem}
.loading{text-align:center;padding:3rem;color:#8a8a85;font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;margin:1rem}
.modal-title{font-size:18px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:14px;color:#5a5a55;margin-bottom:1.25rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:#3a3a35;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid #d4d2cb;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#fff;color:#1a1a18}
.field input:focus,.field textarea:focus{border-color:#1D9E75}
.field textarea{height:72px;resize:none}
.optional{font-size:11px;color:#8a8a85;margin-left:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
